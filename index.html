<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Living Dex Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E53935">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pokemon: {
                            red: '#E53935',
                            blue: '#1E88E5',
                            yellow: '#FDD835',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .game-card {
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
        }
        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .game-card img {
            transition: transform 0.3s ease-out;
        }
        .game-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-pokemon-red text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                            <circle cx="12" cy="12" r="3" fill="currentColor"/>
                            <line x1="2" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"/>
                            <line x1="15" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">Pokemon Living Dex Tracker</h1>
                        <p class="text-sm opacity-90">Track your progress across all games</p>
                    </div>
                </div>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-white/20 transition-colors" title="Toggle dark mode">
                    <svg id="dark-mode-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8 flex-1">
        <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-6">Select a Game</h2>
        
        <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Games loaded dynamically -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center text-gray-500 dark:text-gray-400 text-sm">
        <p>Track your Living Dex progress for Pokemon ROM hacks and fan games</p>
        <p class="mt-2">Add to home screen for the best experience</p>
    </footer>

    <script>
        // Available games
        const games = [
            {
                id: 'renegade-platinum',
                name: 'Renegade Platinum',
                description: 'A difficulty/enhancement hack of Pokemon Platinum with all 493 Pokemon available.',
                region: 'Sinnoh',
                generation: 4,
                coverImage: 'images/pokemon-platinum.png'
            }
        ];

        // Dark mode
        let isDarkMode = localStorage.getItem('darkMode') !== 'false';

        function initDarkMode() {
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateDarkModeIcon();
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            document.documentElement.classList.toggle('dark', isDarkMode);
            updateDarkModeIcon();
        }

        function updateDarkModeIcon() {
            const icon = document.getElementById('dark-mode-icon');
            if (isDarkMode) {
                icon.innerHTML = '<path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>';
            } else {
                icon.innerHTML = '<path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>';
            }
        }

        // Render game cards
        function renderGames() {
            const container = document.getElementById('games-grid');
            
            container.innerHTML = games.map(game => `
                <a href="app.html?game=${game.id}" class="game-card block bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                    <div class="aspect-video bg-gradient-to-br from-pokemon-blue to-pokemon-red overflow-hidden">
                        <img 
                            src="${game.coverImage}" 
                            alt="${game.name}"
                            class="w-full h-full object-cover"
                            onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full text-white text-4xl font-bold\\'>${game.name.charAt(0)}</div>'"
                        >
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-bold text-gray-800 dark:text-white">${game.name}</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">${game.region} Region - Gen ${game.generation}</p>
                        <p class="text-sm text-gray-600 dark:text-gray-300 mt-2 line-clamp-2">${game.description}</p>
                        <div class="mt-4 flex items-center text-pokemon-blue font-medium text-sm">
                            <span>Start Tracking</span>
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </div>
                    </div>
                </a>
            `).join('');
            
            // Add "Coming Soon" placeholder
            container.innerHTML += `
                <div class="game-card block bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden opacity-60">
                    <div class="aspect-video bg-gradient-to-br from-gray-300 to-gray-400 dark:from-gray-600 dark:to-gray-700 flex items-center justify-center">
                        <svg class="w-16 h-16 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-bold text-gray-800 dark:text-white">More Games Coming Soon</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Stay tuned for more ROM hacks</p>
                        <p class="text-sm text-gray-600 dark:text-gray-300 mt-2">Support for additional games will be added in future updates.</p>
                    </div>
                </div>
            `;
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then((reg) => console.log('Service worker registered'))
                .catch((err) => console.log('Service worker registration failed:', err));
        }

        // Initialize
        initDarkMode();
        renderGames();
    </script>
</body>
</html>
