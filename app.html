<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Dex Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#E53935">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        morning: '#FFF3E0',
                        day: '#E3F2FD',
                        night: '#1A237E',
                        pokemon: {
                            red: '#E53935',
                            blue: '#1E88E5',
                            yellow: '#FDD835',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar (Desktop) -->
        <aside id="sidebar" class="w-64 bg-white dark:bg-gray-800 shadow-lg overflow-hidden flex-shrink-0 flex flex-col">
            <div class="p-4 bg-pokemon-red text-white flex justify-between items-center flex-shrink-0">
                <div>
                    <h1 id="game-title" class="text-lg font-bold">Living Dex</h1>
                    <p class="text-sm opacity-90">Tracker</p>
                </div>
                <div class="flex gap-2">
                    <a href="index.html" class="p-2 rounded-lg hover:bg-white/20 transition-colors" title="Game selection">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                    </a>
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-white/20 transition-colors" title="Toggle dark mode">
                        <svg id="dark-mode-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="p-2 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
                <input 
                    type="text" 
                    id="area-search-input" 
                    placeholder="Filter locations..." 
                    class="w-full px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-pokemon-blue focus:border-transparent outline-none bg-white dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                >
            </div>
            <nav id="area-list" class="p-2 overflow-y-auto scrollbar-thin flex-1">
                <!-- Areas populated by JS -->
            </nav>
            <div class="p-3 border-t border-gray-200 dark:border-gray-700 flex gap-2">
                <button onclick="exportData()" class="flex-1 px-3 py-2 text-sm font-medium bg-pokemon-blue text-white hover:bg-blue-600 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    Export
                </button>
                <button onclick="document.getElementById('import-file').click()" class="flex-1 px-3 py-2 text-sm font-medium bg-pokemon-blue text-white hover:bg-blue-600 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Import
                </button>
                <input type="file" id="import-file" accept=".json" class="hidden">
            </div>
        </aside>

        <!-- Main Content Area (3/4 on desktop) -->
        <main class="w-3/4 flex flex-col overflow-hidden">
            <!-- Search Bar -->
            <div class="bg-white dark:bg-gray-800 shadow-md z-10 p-4 flex-shrink-0">
                <div class="max-w-3xl">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search for a Pokemon..." 
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-pokemon-blue focus:border-transparent outline-none bg-white dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                    >
                </div>
            </div>

            <!-- Search Results (hidden by default) -->
            <div id="search-results" class="hidden flex-1 overflow-y-auto">
                <div class="max-w-3xl p-4">
                    <h2 class="text-xl font-bold mb-4 dark:text-white">Search Results</h2>
                    <div id="search-results-content"></div>
                </div>
            </div>

            <!-- Area Carousel -->
            <div id="area-content" class="carousel-container">
                <div id="area-slide-prev" class="area-slide prev no-transition"></div>
                <div id="area-slide-current" class="area-slide current no-transition"></div>
                <div id="area-slide-next" class="area-slide next no-transition"></div>
            </div>
            
            <!-- Navigation hint -->
            <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-gray-400 dark:text-gray-500 text-sm pointer-events-none z-10" id="nav-hint">
                Scroll or use arrow keys to navigate areas
            </div>
        </main>

        <!-- PC Box View (1/4 on desktop) -->
        <aside id="pc-box-aside" class="w-1/4 bg-gray-100 dark:bg-gray-900 border-l border-gray-300 dark:border-gray-700 flex flex-col overflow-hidden">
            <div class="bg-pokemon-red text-white p-3 flex-shrink-0">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="12" r="3" fill="currentColor"/>
                        <line x1="2" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"/>
                        <line x1="15" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    PC Box
                </h2>
                <div id="pc-stats" class="text-sm opacity-80 mt-1">0 Pokemon caught</div>
            </div>
            <div id="pc-box-content" class="flex-1 overflow-y-auto p-2 scrollbar-thin">
                <div id="pc-sprites" class="grid grid-cols-4 gap-1">
                    <!-- Pokemon sprites populated by JS -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Mobile Tab Bar -->
    <div id="mobile-tab-bar" class="fixed bottom-0 left-0 right-0 w-full bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 z-50 hidden" style="padding-bottom: env(safe-area-inset-bottom, 8px);">
        <div class="w-full grid grid-cols-3 py-3">
            <button data-tab="areas" onclick="showMobileTab('areas')" class="py-2 flex flex-col items-center justify-center text-gray-500 gap-2">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                <span class="text-sm">Areas</span>
            </button>
            <button data-tab="tracker" onclick="showMobileTab('tracker')" class="py-2 flex flex-col items-center justify-center text-pokemon-blue gap-2">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <span class="text-sm font-medium">Tracker</span>
            </button>
            <button data-tab="pc" onclick="showMobileTab('pc')" class="py-2 flex flex-col items-center justify-center text-gray-500 gap-2">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
                <span class="text-sm">PC Box</span>
            </button>
        </div>
    </div>

    <!-- Mobile Areas View -->
    <div id="mobile-areas-view" class="hidden bg-gray-100 dark:bg-gray-900 pb-16">
        <div class="bg-pokemon-red text-white p-4 flex justify-between items-center sticky top-0 z-10">
            <h2 class="font-bold text-lg">Areas</h2>
            <div class="flex gap-2">
                <a href="index.html" class="p-2 rounded-lg hover:bg-white/20 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                </a>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-white/20 transition-colors">
                    <svg id="dark-mode-icon-mobile" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="p-3 flex gap-2 bg-pokemon-red">
            <button onclick="exportData()" class="flex-1 px-3 py-2 text-sm font-medium bg-white text-pokemon-red hover:bg-gray-100 rounded-lg transition-colors flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                Export
            </button>
            <button onclick="document.getElementById('import-file').click()" class="flex-1 px-3 py-2 text-sm font-medium bg-white text-pokemon-red hover:bg-gray-100 rounded-lg transition-colors flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Import
            </button>
        </div>
        <div class="p-2">
            <input 
                type="text" 
                id="mobile-area-search-input" 
                placeholder="Filter locations..." 
                class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-pokemon-blue focus:border-transparent outline-none bg-white dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
            >
        </div>
        <div id="mobile-area-list" class="p-2">
            <!-- Mobile area list populated by JS -->
        </div>
    </div>

    <!-- Mobile PC View -->
    <div id="mobile-pc-view" class="hidden bg-gray-100 dark:bg-gray-900 pb-16">
        <div class="bg-pokemon-red text-white p-4 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="12" r="3" fill="currentColor"/>
                    </svg>
                    PC Box
                </h2>
                <div id="mobile-pc-stats" class="text-sm opacity-80">0 Pokemon caught</div>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-white/20 transition-colors">
                <svg id="dark-mode-icon-mobile-pc" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                </svg>
            </button>
        </div>
        <div id="mobile-pc-sprites" class="grid grid-cols-5 gap-1 p-2">
            <!-- Mobile PC sprites populated by JS -->
        </div>
    </div>

    <!-- Evolution Popup Modal -->
    <div id="evo-modal" class="fixed inset-0 hidden z-50 md:left-64 md:right-1/4" style="left: 0; right: 0;">
        <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeEvoModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto pointer-events-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="evo-modal-title" class="text-xl font-bold dark:text-white"></h3>
                    <button onclick="closeEvoModal()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div id="evo-modal-content" class="flex flex-wrap gap-4 justify-center items-stretch">
                    <!-- Evolution sprites populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
